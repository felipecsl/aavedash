services:
  app:
    build:
      context: .
      args:
        VITE_THE_GRAPH_API_KEY: ${VITE_THE_GRAPH_API_KEY}
        VITE_COINGECKO_API_KEY: ${VITE_COINGECKO_API_KEY}
    ports:
      - '3001:3001'
    env_file: ./.env
    volumes:
      - monitor-data:/app/packages/server/data
    restart: unless-stopped

volumes:
  monitor-data:
