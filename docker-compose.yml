services:
  frontend:
    build: .
    ports:
      - '80:80'

  monitor:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '3001:3001'
    env_file: ./.env
    volumes:
      - monitor-data:/app/packages/server/data
    restart: unless-stopped

volumes:
  monitor-data:
